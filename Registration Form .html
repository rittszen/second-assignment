<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRATION FORM</title>
</head>
<body>
    <h1><U><I><div  style="color: blueviolet">STUDENT REGISTRATION FORM</I></U></div></h1>
<main>
<div><i><b><input type="text" placeholder="NAME"></i></b></i></div>
<br>

<div><i><b><input type="text" placeholder="PASSWORD"></i></b></i></div>
<br>
<div><i><b><input type="text" placeholder="EMAIL"></i></b></i></div>
<br>
<div><i><b><input type="text" placeholder="ADDRESS"></i></b></i></div>
<br>
<HR>
<h1><U><I><div  style="color: blueviolet">GENDER</I></U></div></h1>
<input type="radio" value="FEMALE" name="GENDER" id="1">
<i>FEMALE</i>
<BR>
<input type="radio" value="MALE" name="GENDER" id="1">
<i>MALE</i>
<br>
<input type="radio" value="OTHER" name="GENDER" id="1">
<i>OTHER</i>
<HR>
<h1><i><u><b><div  style="color: blueviolet"> YOUR CITY</b></u></i></div></h1>
<select name="CITY">
    <B>
<option value="ISLAMABAD"><div  style="color: blueviolet"><I>ISLAMABAD</I></option></div>
<option value="LAHORE"><div  style="color: blueviolet"><I>LAHORE</I></option></div>
<option value="RAWALPINDI"><div  style="color: blueviolet"><I>RAWALPINDI</I></option></div>
    </B>
</select>
<br>
<br>
<H1><i><u><b><div  style="color: blueviolet">HOBBIES </b></u></i></H1></div>

<input type="checkbox" value="CODING" name="HOBBIES" id="1">
CODING
<br>
<input type="checkbox" value="READING BOOKS" name="HOBBIES" id="1">
READING BOOKS
<br>
<input type="checkbox" value="GAMEING" name="HOBBIES" id="1">
 GAMEING
<br>
<input type="checkbox" value="MUSIC" name="HOBBIES" id="1">
 MUSIC
<br>
<button style="background-color: rgb(160, 42, 193)"><i>SUBMIT</i></button>
</main>
</body>
</html>
